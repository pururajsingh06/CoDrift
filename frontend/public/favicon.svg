<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Squircle Background with Glowing Gradient Border -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="#0d1117" stroke="url(#border-gradient)" stroke-width="12" />
  
  <!-- Glowing Center SVG Graphic -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Angle Bracket (<) -->
    <path d="M 175 170 L 95 256 L 175 342" stroke="url(#neon-gradient)" stroke-width="36" fill="none" />
    
    <!-- Slanted Slash (/) -->
    <path d="M 220 370 L 292 142" stroke="url(#neon-gradient)" stroke-width="36" fill="none" />
    
    <!-- Right Angle Bracket (>) -->
    <path d="M 337 170 L 417 256 L 337 342" stroke="url(#neon-gradient)" stroke-width="36" fill="none" />
  </g>
  
  <!-- Definitions of Gradients -->
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#059669" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6" />
    </linearGradient>
    
    <!-- Neon Green/Emerald Glow Gradient -->
    <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />   <!-- Tailwind emerald-400 -->
      <stop offset="50%" stop-color="#10b981" />  <!-- Tailwind emerald-500 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Tailwind cyan-500 -->
    </linearGradient>
  </defs>
</svg>